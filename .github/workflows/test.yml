name: Git Operations

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  git-job:
    runs-on: [self-hosted, git]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Git
        run: git --version

      - name: Create timestamped file
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          echo "Updated at $(date '+%Y-%m-%d %H:%M:%S')" > update_${TIMESTAMP}.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Auto update with timestamp" || echo "No changes to commit due to rerun"

      - name: Push changes
        if: github.actor != 'github-actions[bot]'
        run: |
          git checkout main
          git push origin main
